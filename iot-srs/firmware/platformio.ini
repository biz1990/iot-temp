; PlatformIO Project Configuration File
; IoT-SRS Arduino Firmware
; Target: Arduino Uno R4 WiFi

[env:unor4wifi]
platform = renesas-ra
board = unor4wifi
framework = arduino

; Serial Monitor
monitor_speed = 9600

; Libraries required (install automatically)
lib_deps =
    arduino-libraries/ArduinoHttpClient@^0.5.2
    adafruit/DHT sensor library@^1.4.4
    bblanchon/ArduinoJson@^7.0.4
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5
    adafruit/Adafruit BusIO@^1.14.1
    adafruit/Adafruit Unified Sensor@^1.1.14

; Build flags
build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D ARDUINO_ARCH_RENESAS

; Upload settings
upload_protocol = serial
upload_speed = 921600

; Extra scripts for OTA (future enhancement)
; extra_scripts = pre:ota_script.py
